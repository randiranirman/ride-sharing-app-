

services:
  location-service:
     build  : ./location-service/location-service
     container_name: location-service-container
     ports:
       - "8082:8082"
     environment:
       - SPRING_PROFILES_ACTIVE=docker
  matching-service:
     build:  ./matching-service/matching-service
     container_name: matching-service-container
     ports:
       - "8084:8084"
     depends_on:
       - location-service

  ride-service:
    build: ./ride-service/ride-service
    container_name: ride-service-container
    ports:
      - "8083:8082"
    depends_on:
      - location-service


  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.8
    container_name: zookeeper1
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Critical: listeners setup
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1